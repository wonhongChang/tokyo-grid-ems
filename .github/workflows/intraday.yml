name: Intraday Update

on:
  schedule:
    # Midnight rollover (JST 00:10) so the dashboard switches dates before the first intraday refresh.
    - cron: '10 15 * * *'
    # Every 2 hours after TEPCO's hourly refresh has settled.
    # Morning 07:30/08:30/09:30 JST are handled by the local Docker ETL
    # scheduler to avoid duplicate historical ETL and Pages deployments.
    # JST: 01:20, 03:20, 05:20, 11:20, 13:20, 15:20, 17:20, 19:20, 21:20
    - cron: '20 2-12/2 * * *'
    - cron: '20 16-20/2 * * *'
    # Morning ramp refreshes. Together with local ETL at 07:30/08:30/09:30 JST,
    # this gives hourly coverage from 06:20 through 11:20 JST.
    # JST: 06:20, 10:20
    - cron: '20 21 * * *'
    - cron: '20 1 * * *'
    # Late-day catch-up after TEPCO has more time to publish the 22:00 bucket.
    # The 23:00 bucket may still be unavailable; the ETL marks it as TEPCO forecast fallback.
    # JST: 23:50
    - cron: '50 14 * * *'
    # Catch-up for the important late-morning refresh if the 11:20 JST scheduled run is delayed or dropped.
    # JST: 12:05
    - cron: '5 3 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update-today:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # ── Restore web/public from data branch ───────────────────────────────
      - name: Restore web/public from data branch
        run: |
          git fetch origin data 2>/dev/null || true
          if git ls-remote --exit-code --heads origin data > /dev/null 2>&1; then
            git worktree add --detach /tmp/data-wt origin/data
            mkdir -p web/public
            rsync -a --exclude='.git' /tmp/data-wt/ web/public/
            git worktree remove /tmp/data-wt --force
          else
            echo "[INFO] No data branch yet"
          fi

      - name: Update intraday actuals, forecasts, and status
        run: python python/etl/run_batch.py --status-only
        env:
          TOKYO_GRID_EMS_OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_DAILY_REPORT_MODEL: ${{ vars.OPENAI_DAILY_REPORT_MODEL }}
          OPENAI_DAILY_REPORT_LOCALIZATION_MODEL: ${{ vars.OPENAI_DAILY_REPORT_LOCALIZATION_MODEL }}
          OPENAI_DAILY_REPORT_TIMEOUT_SECONDS: ${{ vars.OPENAI_DAILY_REPORT_TIMEOUT_SECONDS }}
          OPENAI_DAILY_REPORT_LOCALIZATION_TIMEOUT_SECONDS: ${{ vars.OPENAI_DAILY_REPORT_LOCALIZATION_TIMEOUT_SECONDS }}
          OPENAI_DAILY_REPORT_LOCALES: ${{ vars.OPENAI_DAILY_REPORT_LOCALES }}
          OPENAI_DAILY_REPORT_MAX_CALLS_PER_RUN: ${{ vars.OPENAI_DAILY_REPORT_MAX_CALLS_PER_RUN }}
          OPENAI_DAILY_REPORT_LATEST_ONLY: ${{ vars.OPENAI_DAILY_REPORT_LATEST_ONLY }}

      # ── Push web/public to data branch ────────────────────────────────────
      - name: Push web/public to data branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin data 2>/dev/null || true
          if git ls-remote --exit-code --heads origin data > /dev/null 2>&1; then
            git worktree add --detach /tmp/data-wt origin/data
          else
            git worktree add --orphan -b data /tmp/data-wt
          fi
          rsync -a --delete --exclude='.git' web/public/ /tmp/data-wt/
          cd /tmp/data-wt
          git add -A
          git diff --staged --quiet && echo "No changes" || \
            git commit -m "chore: intraday $(TZ=Asia/Tokyo date +%H:%M JST)"
          git push origin HEAD:data
          cd -
          git worktree remove /tmp/data-wt --force

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install Node dependencies
        run: npm ci
        working-directory: web

      - name: Build
        run: npm run build
        working-directory: web
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/

      - uses: actions/upload-pages-artifact@v5
        with:
          path: web/dist

      - uses: actions/deploy-pages@v5
        id: deploy

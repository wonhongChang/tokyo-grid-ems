name: Intraday Update

on:
  schedule:
    # Midnight rollover (JST 00:10) so the dashboard switches dates before the first intraday refresh.
    - cron: '10 15 * * *'
    # Every 2 hours after TEPCO's hourly refresh has settled.
    # Morning 07:20/09:20 JST are handled by ETL + Deploy to avoid duplicate Pages deployments.
    # JST: 01:20, 03:20, 05:20, 11:20, 13:20, 15:20, 17:20, 19:20, 21:20, 23:20
    - cron: '20 2-20/2 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-today:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # ── Restore web/public from data branch ───────────────────────────────
      - name: Restore web/public from data branch
        run: |
          git fetch origin data 2>/dev/null || true
          if git ls-remote --exit-code --heads origin data > /dev/null 2>&1; then
            git worktree add --detach /tmp/data-wt origin/data
            mkdir -p web/public
            rsync -a --exclude='.git' /tmp/data-wt/ web/public/
            git worktree remove /tmp/data-wt --force
          else
            echo "[INFO] No data branch yet"
          fi

      - name: Update intraday actuals, forecasts, and status
        run: python python/etl/run_batch.py --status-only

      # ── Push web/public to data branch ────────────────────────────────────
      - name: Push web/public to data branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin data 2>/dev/null || true
          if git ls-remote --exit-code --heads origin data > /dev/null 2>&1; then
            git worktree add --detach /tmp/data-wt origin/data
          else
            git worktree add --orphan -b data /tmp/data-wt
          fi
          rsync -a --delete --exclude='.git' web/public/ /tmp/data-wt/
          cd /tmp/data-wt
          git add -A
          git diff --staged --quiet && echo "No changes" || \
            git commit -m "chore: intraday $(TZ=Asia/Tokyo date +%H:%M JST)"
          git push origin HEAD:data
          cd -
          git worktree remove /tmp/data-wt --force

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install Node dependencies
        run: npm ci
        working-directory: web

      - name: Build
        run: npm run build
        working-directory: web
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

      - uses: actions/deploy-pages@v4
        id: deploy

name: ETL + Deploy

on:
  schedule:
    # Retry morning ETL after TEPCO's monthly ZIP publication window.
    # JST: 07:20, 08:20, 09:20
    - cron: '20 22 * * *'
    - cron: '20 23 * * *'
    - cron: '20 0 * * *'
  workflow_dispatch:
    inputs:
      force_historical_etl:
        description: 'Fetch TEPCO ZIP and rerun historical ETL even if yesterday is already finalized'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  etl-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - uses: actions/checkout@v6

      # ── Python setup ──────────────────────────────────────────────────────
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # ── Restore web/public from data branch ───────────────────────────────
      - name: Restore web/public from data branch
        run: |
          git fetch origin data 2>/dev/null || true
          if git ls-remote --exit-code --heads origin data > /dev/null 2>&1; then
            git worktree add --detach /tmp/data-wt origin/data
            mkdir -p web/public
            rsync -a --exclude='.git' /tmp/data-wt/ web/public/
            git worktree remove /tmp/data-wt --force
          else
            echo "[INFO] No data branch yet — starting fresh"
          fi

      # ── Fetch TEPCO data ──────────────────────────────────────────────────
      - name: Check historical ETL necessity
        id: historical_etl
        env:
          FORCE_HISTORICAL_ETL: ${{ github.event_name == 'workflow_dispatch' && inputs.force_historical_etl || false }}
        run: |
          python - <<'PY'
          import json
          import os
          from datetime import datetime, timedelta
          from pathlib import Path
          from zoneinfo import ZoneInfo

          force = str(os.getenv("FORCE_HISTORICAL_ETL", "false")).lower() == "true"
          yesterday = (datetime.now(ZoneInfo("Asia/Tokyo")).date() - timedelta(days=1)).isoformat()
          public_dir = Path("web/public")
          state_path = public_dir / ".etl_state.json"
          actual_path = public_dir / "actual" / f"{yesterday}.json"
          needed = True
          reason = "missing_state_or_actual"

          if force:
              reason = "manual_force"
          else:
              try:
                  state = json.loads(state_path.read_text(encoding="utf-8"))
              except (FileNotFoundError, json.JSONDecodeError):
                  state = {}

              ok_dates = set(state.get("okDates") or [])
              if yesterday not in ok_dates:
                  reason = "yesterday_not_in_ok_dates"
              elif not actual_path.exists():
                  reason = "yesterday_actual_json_missing"
              else:
                  try:
                      actual = json.loads(actual_path.read_text(encoding="utf-8"))
                  except json.JSONDecodeError:
                      actual = {}
                  observed_hours = set()
                  for point in actual.get("series") or []:
                      if point.get("actualMw") is None:
                          continue
                      if point.get("actualSource") == "tepco_forecast_fallback":
                          continue
                      ts = str(point.get("ts") or "")
                      if not ts.startswith(yesterday):
                          continue
                      try:
                          observed_hours.add(int(ts[11:13]))
                      except (ValueError, IndexError):
                          continue
                  if len(observed_hours) >= 24:
                      needed = False
                      reason = "yesterday_already_finalized"
                  else:
                      reason = f"only_{len(observed_hours)}_observed_hours"

          output = Path(os.environ["GITHUB_OUTPUT"])
          with output.open("a", encoding="utf-8") as fh:
              fh.write(f"needed={str(needed).lower()}\n")
              fh.write(f"yesterday={yesterday}\n")
              fh.write(f"reason={reason}\n")
          print(f"[ETL-CHECK] yesterday={yesterday} needed={needed} reason={reason}")
          PY

      - name: Fetch TEPCO CSVs
        if: steps.historical_etl.outputs.needed == 'true'
        run: python python/etl/fetch_tepco.py

      # ── ETL ───────────────────────────────────────────────────────────────
      - name: Run ETL
        if: steps.historical_etl.outputs.needed == 'true'
        run: python python/etl/run_batch.py
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_DAILY_REPORT_MODEL: ${{ vars.OPENAI_DAILY_REPORT_MODEL }}
          OPENAI_DAILY_REPORT_LOCALIZATION_MODEL: ${{ vars.OPENAI_DAILY_REPORT_LOCALIZATION_MODEL }}
          OPENAI_DAILY_REPORT_TIMEOUT_SECONDS: ${{ vars.OPENAI_DAILY_REPORT_TIMEOUT_SECONDS }}
          OPENAI_DAILY_REPORT_LOCALIZATION_TIMEOUT_SECONDS: ${{ vars.OPENAI_DAILY_REPORT_LOCALIZATION_TIMEOUT_SECONDS }}
          OPENAI_DAILY_REPORT_LOCALES: ${{ vars.OPENAI_DAILY_REPORT_LOCALES }}
          OPENAI_DAILY_REPORT_MAX_CALLS_PER_RUN: ${{ vars.OPENAI_DAILY_REPORT_MAX_CALLS_PER_RUN }}
          OPENAI_DAILY_REPORT_LATEST_ONLY: ${{ vars.OPENAI_DAILY_REPORT_LATEST_ONLY }}

      - name: Refresh intraday actuals, forecasts, and status
        run: python python/etl/run_batch.py --status-only
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_DAILY_REPORT_MODEL: ${{ vars.OPENAI_DAILY_REPORT_MODEL }}
          OPENAI_DAILY_REPORT_LOCALIZATION_MODEL: ${{ vars.OPENAI_DAILY_REPORT_LOCALIZATION_MODEL }}
          OPENAI_DAILY_REPORT_TIMEOUT_SECONDS: ${{ vars.OPENAI_DAILY_REPORT_TIMEOUT_SECONDS }}
          OPENAI_DAILY_REPORT_LOCALIZATION_TIMEOUT_SECONDS: ${{ vars.OPENAI_DAILY_REPORT_LOCALIZATION_TIMEOUT_SECONDS }}
          OPENAI_DAILY_REPORT_LOCALES: ${{ vars.OPENAI_DAILY_REPORT_LOCALES }}
          OPENAI_DAILY_REPORT_MAX_CALLS_PER_RUN: ${{ vars.OPENAI_DAILY_REPORT_MAX_CALLS_PER_RUN }}
          OPENAI_DAILY_REPORT_LATEST_ONLY: ${{ vars.OPENAI_DAILY_REPORT_LATEST_ONLY }}

      # ── Push web/public to data branch ────────────────────────────────────
      - name: Push web/public to data branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin data 2>/dev/null || true
          if git ls-remote --exit-code --heads origin data > /dev/null 2>&1; then
            git worktree add --detach /tmp/data-wt origin/data
          else
            git worktree add --orphan -b data /tmp/data-wt
          fi
          rsync -a --delete --exclude='.git' web/public/ /tmp/data-wt/
          cd /tmp/data-wt
          git add -A
          git diff --staged --quiet && echo "No changes" || \
            git commit -m "chore: ETL $(TZ=Asia/Tokyo date +%Y-%m-%dT%H:%M JST)"
          git push origin HEAD:data
          cd -
          git worktree remove /tmp/data-wt --force

      # ── Build Vite app ────────────────────────────────────────────────────
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install Node dependencies
        run: npm ci
        working-directory: web

      - name: Build
        run: npm run build
        working-directory: web
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/

      # ── Deploy to GitHub Pages ────────────────────────────────────────────
      - uses: actions/upload-pages-artifact@v5
        with:
          path: web/dist

      - uses: actions/deploy-pages@v5
        id: deploy

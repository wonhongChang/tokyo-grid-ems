name: ETL + Deploy

on:
  schedule:
    # Retry morning ETL after TEPCO's monthly ZIP publication window.
    # JST: 07:20, 08:20, 09:20
    - cron: '20 22 * * *'
    - cron: '20 23 * * *'
    - cron: '20 0 * * *'
  workflow_dispatch:
    inputs:
      refresh_today_forecast:
        description: Rebuild today's observed forecast hours instead of preserving published values
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  etl-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - uses: actions/checkout@v6

      # ── Python setup ──────────────────────────────────────────────────────
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # ── Restore web/public from data branch ───────────────────────────────
      - name: Restore web/public from data branch
        run: |
          git fetch origin data 2>/dev/null || true
          if git ls-remote --exit-code --heads origin data > /dev/null 2>&1; then
            git worktree add --detach /tmp/data-wt origin/data
            mkdir -p web/public
            rsync -a --exclude='.git' /tmp/data-wt/ web/public/
            git worktree remove /tmp/data-wt --force
          else
            echo "[INFO] No data branch yet — starting fresh"
          fi

      # ── Fetch TEPCO data ──────────────────────────────────────────────────
      - name: Fetch TEPCO CSVs
        run: python python/etl/fetch_tepco.py

      # ── ETL ───────────────────────────────────────────────────────────────
      - name: Run ETL
        run: python python/etl/run_batch.py

      - name: Refresh intraday actuals, forecasts, and status
        env:
          REFRESH_TODAY_FORECAST: ${{ inputs.refresh_today_forecast || 'false' }}
        run: |
          if [ "$REFRESH_TODAY_FORECAST" = "true" ]; then
            python python/etl/run_batch.py --status-only --refresh-today-forecast
          else
            python python/etl/run_batch.py --status-only
          fi

      # ── Push web/public to data branch ────────────────────────────────────
      - name: Push web/public to data branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin data 2>/dev/null || true
          if git ls-remote --exit-code --heads origin data > /dev/null 2>&1; then
            git worktree add --detach /tmp/data-wt origin/data
          else
            git worktree add --orphan -b data /tmp/data-wt
          fi
          rsync -a --delete --exclude='.git' web/public/ /tmp/data-wt/
          cd /tmp/data-wt
          git add -A
          git diff --staged --quiet && echo "No changes" || \
            git commit -m "chore: ETL $(TZ=Asia/Tokyo date +%Y-%m-%dT%H:%M JST)"
          git push origin HEAD:data
          cd -
          git worktree remove /tmp/data-wt --force

      # ── Build Vite app ────────────────────────────────────────────────────
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install Node dependencies
        run: npm ci
        working-directory: web

      - name: Build
        run: npm run build
        working-directory: web
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/

      # ── Deploy to GitHub Pages ────────────────────────────────────────────
      - uses: actions/upload-pages-artifact@v5
        with:
          path: web/dist

      - uses: actions/deploy-pages@v5
        id: deploy
